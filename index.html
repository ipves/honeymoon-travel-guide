<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#143a4a" />
    <title>Lila & Noah Honeymoon Guide</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css?v=94" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <img src="assets/amalfi-paris-hero.png" alt="" />
        <div class="hero__shade"></div>
        <div class="hero__content">
          <p class="eyebrow">June 20 - July 1</p>
          <h1>Lila and Noah's Honeymoon</h1>
          <p>From Stabby to Nappy</p>
        </div>
      </header>

      <main>
        <section class="search-panel" aria-label="Ask the guide">
          <label for="searchInput">Ask the guide</label>
          <form class="ask-box" id="askForm">
            <div class="ask-input">
              <span aria-hidden="true">?</span>
              <input id="searchInput" autocomplete="off" placeholder="Ask about tickets, timing, packing, restaurants..." />
            </div>
            <div class="ask-actions">
              <button id="askButton" type="submit">Ask</button>
              <button id="clearSearch" type="button">Clear</button>
            </div>
          </form>
        </section>

        <section id="searchResults" class="results" hidden></section>

        <section class="view is-active" data-view="today">
          <div class="section-heading">
            <p>Open first</p>
            <h2>Trip Dashboard</h2>
          </div>
          <div id="dashboardGrid" class="dashboard"></div>
        </section>

        <section class="view" data-view="days">
          <div class="section-heading">
            <p>Day by day</p>
            <h2>Itinerary</h2>
          </div>
          <div id="dayList" class="timeline"></div>
        </section>

        <section class="view" data-view="food">
          <div class="section-heading">
            <p>By mood and location</p>
            <h2>Dining</h2>
          </div>
          <div id="foodList" class="grid"></div>
        </section>

        <section class="view" data-view="move">
          <div class="section-heading">
            <p>When you need the next step</p>
            <h2>Transport</h2>
          </div>
          <div id="transportList" class="stack"></div>
        </section>

        <section class="view" data-view="pack">
          <div class="section-heading">
            <p>Saved on this phone</p>
            <h2>Checklist</h2>
          </div>
          <div id="checklistList" class="stack"></div>
        </section>

        <section class="view" data-view="apps">
          <div class="section-heading">
            <p>Download before departure</p>
            <h2>Apps</h2>
          </div>
          <div id="appList" class="app-list"></div>
        </section>

        <section class="view" data-view="docs">
          <div class="section-heading">
            <p>Offline source library</p>
            <h2>Documents</h2>
          </div>
          <div id="docList" class="stack"></div>
        </section>
      </main>

      <nav class="tabbar" aria-label="Guide sections">
        <button class="is-active" data-tab="today" type="button"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10.8 12 3l9 7.8"/><path d="M5.5 9.5V21h13V9.5"/><path d="M9.5 21v-6h5v6"/></svg>Home</button>
        <button data-tab="days" type="button"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3v4"/><path d="M17 3v4"/><path d="M4 8h16"/><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M8 12h.01"/><path d="M12 12h.01"/><path d="M16 12h.01"/><path d="M8 16h.01"/><path d="M12 16h.01"/></svg>Days</button>
        <button data-tab="food" type="button"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3v8"/><path d="M4.5 3v8"/><path d="M9.5 3v8"/><path d="M4.5 11h5"/><path d="M7 11v10"/><path d="M16 3c2 1.6 3 4 3 7v11"/><path d="M16 3v8h3"/></svg>Food</button>
        <button data-tab="move" type="button"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 16.5 21 7l-7.5 14-3-7-8-2.5Z"/><path d="M21 7 10.5 14"/></svg>Move</button>
        <button data-tab="pack" type="button"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="7" width="14" height="14" rx="2"/><path d="M9 7V5.5A2.5 2.5 0 0 1 11.5 3h1A2.5 2.5 0 0 1 15 5.5V7"/><path d="M9 12h6"/><path d="M8 21v-2"/><path d="M16 21v-2"/></svg>Pack</button>
        <button data-tab="apps" type="button"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="7" height="7" rx="1.5"/><rect x="13" y="4" width="7" height="7" rx="1.5"/><rect x="4" y="13" width="7" height="7" rx="1.5"/><rect x="13" y="13" width="7" height="7" rx="1.5"/></svg>Apps</button>
        <button data-tab="docs" type="button"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3h7l4 4v14H7z"/><path d="M14 3v5h4"/><path d="M9.5 12h5"/><path d="M9.5 16h5"/></svg>Docs</button>
      </nav>
    </div>

    <script src="data.js?v=94"></script>
    <script src="app.js?v=94"></script>
  </body>
</html>
